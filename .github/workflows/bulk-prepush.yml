name: Pré-push en masse (articles datés-futur)
on:
  schedule:
    - cron: '30 5 * * *'        # chaque jour 05:30 UTC : draine le backlog par paliers (plafond 250/run, Vercel-safe)
  workflow_dispatch:
    inputs:
      limit:
        description: "Nb max d'articles à pousser (vide = plafond 250)"
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: bulk-prepush
  cancel-in-progress: false
jobs:
  prepush:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Pousser les articles datés-futur (plafond 250/run par défaut)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=250; fi
          python3 planifier.py --push "$LIMIT"
      - name: Commit calendrier
        run: |
          if [ -n "$(git status --porcelain calendrier-publication.csv)" ]; then
            git config user.name "blog-scheduler"
            git config user.email "teamsquare.ai@gmail.com"
            git add calendrier-publication.csv
            git commit -m "bulk-prepush: maj calendrier ($(date -u +%F))"
            git push
          fi
