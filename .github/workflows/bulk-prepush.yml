name: Pré-push en masse (articles datés-futur)
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Nb max d'articles à pousser (vide = tous les planned)"
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: bulk-prepush
  cancel-in-progress: false
jobs:
  prepush:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Pousser les articles datés-futur
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python3 planifier.py --push ${{ github.event.inputs.limit }}
          else
            python3 planifier.py --push
          fi
      - name: Commit calendrier
        run: |
          if [ -n "$(git status --porcelain calendrier-publication.csv)" ]; then
            git config user.name "blog-scheduler"
            git config user.email "teamsquare.ai@gmail.com"
            git add calendrier-publication.csv
            git commit -m "bulk-prepush: maj calendrier ($(date -u +%F))"
            git push
          fi
